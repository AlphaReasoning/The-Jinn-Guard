# Release integrity pipeline (#46 Phase 2).
#
# Fires ONLY on a version tag push (`v*`), so it never runs on ordinary push/PR
# CI. On a tagged release it:
#   1. builds the release binary and a CycloneDX SBOM,
#   2. generates SLSA v3 build provenance for the artifacts,
#   3. signs the binary + SBOM with cosign (keyless / Sigstore OIDC),
#   4. publishes everything to a GitHub Release.
#
# Verification instructions (cosign verify-blob + slsa-verifier, expected OIDC
# identity) live in RELEASE_INTEGRITY.md.
#
# NOTE: this workflow is inert until a maintainer pushes a `v*` tag. Before
# cutting the first signed release, confirm the slsa-github-generator tag pinned
# below is current (https://github.com/slsa-framework/slsa-github-generator/releases).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Build the release artifacts and emit their sha256 subjects for SLSA.
  # SOURCE_DATE_EPOCH is pinned to the tagged commit's timestamp as a first step
  # toward reproducibility (see RELEASE_INTEGRITY.md for the honest scope).
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libz3-dev keyutils

      - name: Pin SOURCE_DATE_EPOCH to the tagged commit
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --locked

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/ts_cli dist/ts_cli

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/jinnguard-sbom.cyclonedx.json

      - name: Compute checksums + SLSA subjects
        id: hash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ts_cli jinnguard-sbom.cyclonedx.json > checksums.txt
          cat checksums.txt
          echo "hashes=$(base64 -w0 checksums.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # SLSA v3 provenance for the built artifacts (official reusable workflow).
  # Produces a signed in-toto attestation and attaches it to the release.
  # ───────────────────────────────────────────────────────────────────────────
  provenance:
    name: SLSA provenance
    needs: [build]
    permissions:
      actions: read # read the workflow run for provenance
      id-token: write # keyless signing of the provenance
      contents: write # attach provenance to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  # ───────────────────────────────────────────────────────────────────────────
  # Keyless (Sigstore) signatures for the binary and SBOM, then publish the
  # GitHub Release with all artifacts + detached signatures + certificates.
  # ───────────────────────────────────────────────────────────────────────────
  sign-and-release:
    name: Sign + publish release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release / upload assets
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5; needed for the RELEASE_INTEGRITY.md release body

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign artifacts (keyless)
        run: |
          set -euo pipefail
          cd dist
          for f in ts_cli jinnguard-sbom.cyclonedx.json; do
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done
          ls -1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/ts_cli
            dist/jinnguard-sbom.cyclonedx.json
            dist/checksums.txt
            dist/ts_cli.sig
            dist/ts_cli.pem
            dist/jinnguard-sbom.cyclonedx.json.sig
            dist/jinnguard-sbom.cyclonedx.json.pem
          fail_on_unmatched_files: true
          body_path: RELEASE_INTEGRITY.md
